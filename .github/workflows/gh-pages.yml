name: GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'hackathon/index.html'
      - 'hackathon/README.md'
      - 'hackathon/Student/java/Challenge-*.md'
      - 'hackathon/Student/dotnet/Challenge-*.md'
      - 'hackathon/Coach/java/Challenge-*.md'
      - 'hackathon/Coach/dotnet/Challenge-*.md'

  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new push
concurrency:
  group: "pages"
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Assemble site
        run: |
          mkdir -p _site/Student/java _site/Student/dotnet \
                   _site/Coach/java  _site/Coach/dotnet
          cp hackathon/index.html _site/index.html
          cp hackathon/README.md  _site/README.md
          cp hackathon/Student/java/Challenge-*.md   _site/Student/java/
          cp hackathon/Student/dotnet/Challenge-*.md _site/Student/dotnet/
          cp hackathon/Coach/java/Challenge-*.md     _site/Coach/java/
          cp hackathon/Coach/dotnet/Challenge-*.md   _site/Coach/dotnet/

      - name: Setup Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
