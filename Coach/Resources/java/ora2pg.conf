# Ora2Pg Configuration File for PhotoAlbum Oracle → PostgreSQL Migration
# Reference: https://ora2pg.darold.net/configuration.html

[ora2pg]

# ═══════════════════════════════════════════════════════════════════════════
# ORACLE CONNECTION SETTINGS
# ═══════════════════════════════════════════════════════════════════════════

# Oracle Home directory (optional; if not set, Perl modules will search PATH)
ORACLE_HOME=

# Oracle DSN connection string
# Format: dbi:Oracle:host=<host>;port=<port>;sid=<sid>
# For Oracle XE container: localhost:1521/FREEPDB1
ORACLE_DSN=dbi:Oracle:host=localhost;sid=FREEPDB1

# Oracle user (must have SELECT on the target schema tables)
ORACLE_USER=photoalbum

# Oracle password
ORACLE_PASSWORD=photoalbum

# ═══════════════════════════════════════════════════════════════════════════
# MIGRATION SCOPE
# ═══════════════════════════════════════════════════════════════════════════

# Schema to migrate (case-insensitive; Ora2Pg converts to lowercase for PostgreSQL)
SCHEMA=PHOTOALBUM

# Schema owner in PostgreSQL (will be created if not exists)
OWNER=photoalbum

# Object types to export (comma-separated)
# Common types: TABLE, INDEX, SEQUENCE, VIEW, TRIGGER, FUNCTION, PROCEDURE
# For PhotoAlbum: only TABLE and SEQUENCE needed (no stored procedures)
TYPE=TABLE,SEQUENCE,INDEX

# Export the schema definition (1 = yes, 0 = no)
EXPORT_SCHEMA=1

# ═══════════════════════════════════════════════════════════════════════════
# OUTPUT & FORMATTING
# ═══════════════════════════════════════════════════════════════════════════

# Output file path (Ora2Pg writes the SQL script here)
# -o flag on command-line will override this
OUTPUT_FILE=./photoalbum.sql

# Character set for output (usually UTF8 for modern systems)
OUTPUT_ENCODING=UTF8

# ═══════════════════════════════════════════════════════════════════════════
# DATA TYPE CONVERSION
# ═══════════════════════════════════════════════════════════════════════════

# Allow Ora2Pg to apply data type mappings (1 = yes)
# Mappings: VARCHAR2→VARCHAR, NUMBER→NUMERIC, BLOB→BYTEA, CLOB→TEXT, etc.
REPLACE_TABLES=1

# ═══════════════════════════════════════════════════════════════════════════
# USAGE
# ═══════════════════════════════════════════════════════════════════════════

# Command to run:
#   ora2pg -c ora2pg.conf -o ./photoalbum.sql
#
# This will generate a PostgreSQL-compatible SQL script containing:
#   - Table definitions with data type conversions
#   - Sequences
#   - Indexes
#   - Data insert statements
#
# To import into Azure PostgreSQL:
#   export PGPASSWORD="your-admin-password"
#   psql -h <azure-db-fqdn> -U <admin-user> -d photoalbum < photoalbum.sql
