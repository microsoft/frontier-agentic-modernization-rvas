# Ora2Pg Configuration File for PhotoAlbum Oracle → PostgreSQL Migration
# Reference: https://ora2pg.darold.net/configuration.html

[ora2pg]

# ═══════════════════════════════════════════════════════════════════════════
# ORACLE CONNECTION SETTINGS
# ═══════════════════════════════════════════════════════════════════════════

# Oracle Home directory (optional; if not set, Perl modules will search PATH)
# NOTE: Ora2Pg directives use a TAB/space separator, NOT '='. With '=' the
# whole "KEY=value" is read as the directive name and the real value is lost.
#ORACLE_HOME

# Oracle DSN connection string
# Format: dbi:Oracle:host=<host>;port=<port>;sid=<sid>
# For Oracle Free PDB: FREEPDB1 is a SERVICE name (a pluggable database),
# so connect with service_name=, not sid=.
ORACLE_DSN	dbi:Oracle:host=localhost;port=1521;service_name=FREEPDB1

# Oracle user (must have SELECT on the target schema tables)
ORACLE_USER	photoalbum

# Oracle password (the directive is ORACLE_PWD, not ORACLE_PASSWORD)
ORACLE_PWD	photoalbum

# ═══════════════════════════════════════════════════════════════════════════
# MIGRATION SCOPE
# ═══════════════════════════════════════════════════════════════════════════

# Schema to migrate (case-insensitive; Ora2Pg converts to lowercase for PostgreSQL)
SCHEMA PHOTOALBUM

# Schema owner in PostgreSQL (will be created if not exists)
OWNER photoalbum

# Object types to export (comma-separated)
# Valid types: TABLE, SEQUENCE, VIEW, TRIGGER, FUNCTION, PROCEDURE, ...
# For PhotoAlbum: only TABLE and SEQUENCE needed (no stored procedures)
TYPE	TABLE,SEQUENCE,INDEX

# Export the schema definition (1 = yes, 0 = no)
EXPORT_SCHEMA	1

# ═══════════════════════════════════════════════════════════════════════════
# OUTPUT & FORMATTING
# ═══════════════════════════════════════════════════════════════════════════

# Output file path (Ora2Pg writes the SQL script here)
# -o flag on command-line will override this
# NOTE: do NOT prefix with "./" - when multiple TYPEs are exported Ora2Pg
# prepends "<TYPE>_" to the filename (e.g. TABLE_photoalbum.sql), and a
# leading "./" would produce an invalid path like "TABLE_./photoalbum.sql".
OUTPUT	photoalbum.sql

# Oracle client charset; AL32UTF8 ensures UTF-8 output
# (OUTPUT_ENCODING is not a valid directive)
NLS_LANG	AMERICAN_AMERICA.AL32UTF8

# ═══════════════════════════════════════════════════════════════════════════
# DATA TYPE CONVERSION
# ═══════════════════════════════════════════════════════════════════════════

# Data type mapping (VARCHAR2->VARCHAR, NUMBER->NUMERIC, BLOB->BYTEA,
# CLOB->TEXT, etc.) is applied automatically by Ora2Pg. REPLACE_TABLES is for
# RENAMING tables (OLD_NAME NEW_NAME), not type mapping, so it is left unset.

# ═══════════════════════════════════════════════════════════════════════════
# USAGE
# ═══════════════════════════════════════════════════════════════════════════

# Commands to run:

# 1. schema
# ora2pg -c ora2pg.conf -o photoalbum.sql      # -> TABLE_photoalbum.sql, SEQUENCE_photoalbum.sql

# 2. data
# ora2pg -c ora2pg.conf -t COPY -o data.sql -u system -w photoalbum

# 3. load into Postgres, schema first then data
#  export PGPASSWORD="your-admin-password"
#  psql -h wth-psql-soi34z.postgres.database.azure.com -U psqladmin -d photoalbum <<'SQL'
#  CREATE ROLE photoalbum LOGIN PASSWORD 'photoalbum';
#  GRANT photoalbum TO psqladmin;
#  SQL
#  psql -h <azure-db-fqdn> -U <admin-user> -d photoalbum < TABLE_photoalbum.sql
#  psql -h <azure-db-fqdn> -U <admin-user> -d photoalbum < SEQUENCE_photoalbum.sql
#  psql -h <azure-db-fqdn> -U <admin-user> -d photoalbum < data.sql
