# Spring Boot Configuration
server.port=${SERVER_PORT:8080}

# Character encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Azure Key Vault - secrets are automatically resolved from Key Vault when configured
spring.cloud.azure.keyvault.secret.enabled=true
spring.cloud.azure.keyvault.secret.endpoint=${AZURE_KEYVAULT_ENDPOINT:}

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:photoalbum}
spring.datasource.username=${DB_USERNAME:photoalbum}
spring.datasource.password=${DB_PASSWORD:${azure.keyvault.db-password:photoalbum}}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Application Configuration - File Upload Validation
app.file-upload.max-file-size-bytes=10485760
app.file-upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp
app.file-upload.max-files-per-upload=10

# Azure OpenAI — vision-enabled chat completions for photo enrichment.
# Leave AZURE_OPENAI_ENDPOINT blank to disable AI enrichment locally.
azure.openai.endpoint=${AZURE_OPENAI_ENDPOINT:}
azure.openai.deployment=${AZURE_OPENAI_DEPLOYMENT:gpt-4.1-mini}

# Logging
logging.level.com.photoalbum=DEBUG
logging.level.org.springframework.web=DEBUG
